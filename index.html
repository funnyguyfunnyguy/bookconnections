<style>
  :root {
    --bg-deep: #0a0a14;
    --bg-mid: #111122;
    --bg-card: rgba(255,255,255,0.05);
    --gold: #F9DF6D;
    --gold-dim: #c4a83a;
    --gold-glow: rgba(249,223,109,0.25);
    --text: #d4d4e0;
    --text-dim: #6a6a80;
    --text-faint: #3e3e55;
    --cat-yellow: #F9DF6D;
    --cat-green: #A0C35A;
    --cat-blue: #7EB8DA;
    --cat-purple: #BA81C5;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(90,60,140,0.12), transparent),
      radial-gradient(ellipse 60% 50% at 20% 100%, rgba(40,60,120,0.08), transparent),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(120,50,80,0.06), transparent),
      var(--bg-deep);
  }

  /* ── Particles ── */
  #particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    8%   { opacity: 0.8; }
    85%  { opacity: 0.4; }
    100% { transform: translateY(-105vh) translateX(var(--dx)) scale(0.3); opacity: 0; }
  }

  /* ── Layout ── */
  #app {
    position: relative; z-index: 1;
    width: 100%; max-width: 520px;
    padding: 28px 16px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    animation: fadeIn 0.7s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 2px; }
  .header h1 {
    font-family: 'Cinzel', Georgia, serif;
    font-weight: 900; font-size: 30px;
    letter-spacing: 5px; text-transform: uppercase;
    background: linear-gradient(135deg, #F9DF6D 0%, #e8a849 30%, #F9DF6D 60%, #d4a03c 100%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 5s linear infinite;
    line-height: 1.2;
  }
  @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

  .subtitle {
    color: var(--text-dim); font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase; margin-top: 6px;
  }
  .instructions {
    color: var(--text-faint); font-size: 14px; font-style: italic; margin-top: 10px;
  }
  .puzzle-number {
    display: inline-block; margin-top: 8px; padding: 3px 14px;
    border: 1px solid rgba(249,223,109,0.15); border-radius: 100px;
    font-family: 'Cinzel', Georgia, serif; font-size: 11px;
    color: var(--gold-dim); letter-spacing: 2px;
  }

  /* ── Solved categories ── */
  #solved { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .solved-cat {
    border-radius: var(--radius); padding: 16px 20px; text-align: center;
    animation: revealCat 0.45s ease both;
    position: relative; overflow: hidden;
  }
  @keyframes revealCat { 0% { transform: scaleY(0.3); opacity: 0; } 100% { transform: scaleY(1); opacity: 1; } }
  .solved-cat .cat-name {
    font-family: 'Cinzel', Georgia, serif; font-weight: 700;
    font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    color: #1a1a1a; margin-bottom: 3px;
  }
  .solved-cat .cat-words {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 13px; color: #1a1a1a; opacity: 0.7; letter-spacing: 1px;
  }

  /* ── Grid ── */
  #grid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
  }

  .tile {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius);
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text);
    font-family: 'Cinzel', Georgia, serif;
    font-weight: 700; font-size: 13px;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    text-align: center;
    padding: 4px;
    line-height: 1.15;
  }
  .tile:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }
  .tile.selected {
    background: linear-gradient(135deg, var(--gold), #e6c84a);
    color: #1a1a1a;
    border-color: transparent;
    transform: scale(1.04);
    box-shadow: 0 4px 18px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .tile.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
  }
  .tile.small-text { font-size: 10px; }

  /* ── Mistakes ── */
  .mistakes { display: flex; gap: 8px; align-items: center; justify-content: center; }
  .mistakes span { font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    transition: all 0.35s ease;
  }
  .dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold-glow); }
  .dot.spent  { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    padding: 10px 24px; border-radius: 100px;
    font-family: 'Cinzel', Georgia, serif; font-size: 12px;
    font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; border: none; outline: none;
  }
  .btn:hover:not(:disabled) { filter: brightness(1.12); }
  .btn-ghost {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12) !important;
    color: var(--text-dim);
  }
  .btn-ghost:disabled { color: var(--text-faint); cursor: default; }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #e6c84a);
    color: #1a1a1a;
    box-shadow: 0 4px 16px var(--gold-glow);
  }
  .btn-gold:disabled {
    background: rgba(255,255,255,0.05);
    color: var(--text-faint);
    box-shadow: none; cursor: default;
  }
  .btn-gold.pulse { animation: pulse 2s infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(249,223,109,0.35); }
    50%     { box-shadow: 0 0 0 8px rgba(249,223,109,0); }
  }

  /* ── Toast ── */
  #toast {
    position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
    background: rgba(16,16,30,0.96); color: var(--gold);
    padding: 10px 28px; border-radius: 100px;
    font-family: 'Cinzel', Georgia, serif; font-size: 13px;
    font-weight: 600; letter-spacing: 1.5px;
    border: 1px solid rgba(249,223,109,0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 200; pointer-events: none;
    opacity: 0; transition: opacity 0.25s ease;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── End state ── */
  .end-msg {
    text-align: center; padding: 8px 0;
  }
  .end-msg p {
    font-family: 'Cinzel', Georgia, serif; font-size: 18px;
    font-weight: 700; letter-spacing: 2px;
  }

  /* ── Countdown ── */
  .countdown {
    text-align: center; margin-top: 4px;
    color: var(--text-dim); font-size: 13px; letter-spacing: 1px;
  }
  .countdown .time {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 22px; color: var(--gold-dim); letter-spacing: 3px;
    display: block; margin-top: 4px;
  }

  /* ── Series legend ── */
  .legend {
    display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; margin-top: 6px;
  }
  .legend span { font-size: 11px; color: var(--text-faint); letter-spacing: 1.5px; }
  .legend .dot-pj { color: #4EC9B0; }
  .legend .dot-hp { color: #D4A03C; }
  .legend .dot-fw { color: #BA81C5; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    .tile { font-size: 10px; letter-spacing: 0.5px; }
    .tile.small-text { font-size: 9px; }
    .header h1 { font-size: 24px; letter-spacing: 3px; }
    .btn { padding: 9px 18px; font-size: 11px; }
  }
</style>
</head>

// ═══════════════════════════════════════════════
//  PUZZLE VALIDATION — catch duplicates at load
// ═══════════════════════════════════════════════
(function validatePuzzles() {
  for (let i = PUZZLES.length - 1; i >= 0; i--) {
    const allWords = PUZZLES[i].categories.flatMap(c => c.words);
    const seen = new Set();
    let hasDup = false;
    allWords.forEach(w => {
      if (seen.has(w)) { console.error(`Puzzle ${i+1} duplicate: "${w}"`); hasDup = true; }
      seen.add(w);
    });
    if (hasDup || allWords.length !== 16) {
      console.warn(`Removing broken puzzle ${i+1}`);
      PUZZLES.splice(i, 1);
    }
  }
})();

// ═══════════════════════════════════════════════
//  DATE-BASED PUZZLE SELECTION (UTC, no repeats)
// ═══════════════════════════════════════════════
function getDayNumber() {
  const now = new Date();
  // UTC calendar day avoids DST ±1h drift
  const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  const epochUTC = Date.UTC(2025, 0, 1);
  return Math.floor((todayUTC - epochUTC) / 86400000);
}

function seededPermutation(n, seed) {
  // Fisher-Yates shuffle with LCG deterministic RNG
  const order = Array.from({length: n}, (_, i) => i);
  let s = ((seed + 1) * 2654435769) >>> 0;
  for (let i = n - 1; i > 0; i--) {
    s = ((s * 1103515245) + 12345) >>> 0;
    const j = s % (i + 1);
    [order[i], order[j]] = [order[j], order[i]];
  }
  return order;
}

function getDayIndex() {
  const dayNum = getDayNumber();
  const n = PUZZLES.length;
  const cycle = Math.floor(dayNum / n);
  const dayInCycle = ((dayNum % n) + n) % n; // handle negative

  const perm = seededPermutation(n, cycle);

  // Prevent the same puzzle appearing at a cycle boundary
  if (cycle > 0 && dayInCycle === 0) {
    const prevPerm = seededPermutation(n, cycle - 1);
    const lastOfPrev = prevPerm[n - 1];
    if (perm[0] === lastOfPrev && n > 1) {
      [perm[0], perm[1]] = [perm[1], perm[0]];
    }
  }

  return perm[dayInCycle];
}

function getPuzzleNumber() {
  return getDayNumber() + 1;
}

// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
let todayPuzzle = PUZZLES[getDayIndex()];
let grid = [];
let selected = [];
let solved = [];
let mistakes = 0;
const maxMistakes = 4;
let gameOver = false;
let gameWon = false;
let toastTimer = null;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  todayPuzzle = PUZZLES[getDayIndex()];
  grid = shuffle(todayPuzzle.categories.flatMap(c => c.words));
  selected = [];
  solved = [];
  mistakes = 0;
  gameOver = false;
  gameWon = false;

  document.getElementById('puzzleNum').textContent = '# ' + getPuzzleNumber();
  renderMistakes();
  renderGrid();
  renderSolved();
  updateButtons();
  document.getElementById('endState').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('mistakesRow').style.display = 'flex';
  startCountdown();
}

// ═══════════════════════════════════════════════
//  SHUFFLE
// ═══════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleGrid() {
  grid = shuffle(grid);
  renderGrid();
}

// ═══════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════
function renderGrid() {
  const el = document.getElementById('grid');
  el.innerHTML = '';
  grid.forEach(word => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (selected.includes(word) ? ' selected' : '');
    if (word.length > 9) tile.classList.add('small-text');
    tile.textContent = word;
    tile.onclick = () => toggleWord(word);
    el.appendChild(tile);
  });
}

function renderSolved() {
  const el = document.getElementById('solved');
  el.innerHTML = '';
  solved.forEach((cat, i) => {
    const div = document.createElement('div');
    div.className = 'solved-cat';
    div.style.background = cat.color;
    div.style.animationDelay = (i * 0.04) + 's';
    div.innerHTML = `
      <div class="cat-name">${cat.emoji} ${cat.name}</div>
      <div class="cat-words">${cat.words.join(', ')}</div>
    `;
    el.appendChild(div);
  });
}

function renderMistakes() {
  const el = document.getElementById('mistakesRow');
  let html = '<span>Mistakes remaining</span><div style="display:flex;gap:6px">';
  for (let i = 0; i < maxMistakes; i++) {
    html += `<div class="dot ${i < (maxMistakes - mistakes) ? 'active' : 'spent'}"></div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function updateButtons() {
  document.getElementById('btnDeselect').disabled = selected.length === 0;
  const submitBtn = document.getElementById('btnSubmit');
  submitBtn.disabled = selected.length !== 4;
  submitBtn.classList.toggle('pulse', selected.length === 4);
}

// ═══════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════
function toggleWord(word) {
  if (gameOver || gameWon) return;
  if (selected.includes(word)) {
    selected = selected.filter(w => w !== word);
  } else if (selected.length < 4) {
    selected.push(word);
  }
  renderGrid();
  updateButtons();
}

function deselectAll() {
  selected = [];
  renderGrid();
  updateButtons();
}

function submitGuess() {
  if (selected.length !== 4) return;

  const match = todayPuzzle.categories.find(cat =>
    !solved.includes(cat) && selected.every(w => cat.words.includes(w))
  );

  if (match) {
    solved.push(match);
    grid = grid.filter(w => !match.words.includes(w));
    selected = [];
    renderSolved();
    renderGrid();
    updateButtons();

    const msgs = ["Brilliant!", "Well done!", "Nailed it!", "Impressive!"];
    showToast(msgs[solved.length - 1] || "Nice!");

    if (solved.length === 4) {
      gameWon = true;
      endGame(true);
    }
  } else {
    // Check one-away
    let isOneAway = false;
    for (const cat of todayPuzzle.categories) {
      if (solved.includes(cat)) continue;
      if (selected.filter(w => cat.words.includes(w)).length === 3) {
        isOneAway = true;
        break;
      }
    }

    if (isOneAway) {
      showToast("One away...");
    } else {
      showToast("Not quite...");
    }

    // Shake selected tiles
    document.querySelectorAll('.tile.selected').forEach(t => {
      t.classList.add('shake');
      setTimeout(() => t.classList.remove('shake'), 450);
    });

    selected = [];
    mistakes++;
    renderGrid();
    renderMistakes();
    updateButtons();

    if (mistakes >= maxMistakes) {
      gameOver = true;
      // Reveal all remaining
      todayPuzzle.categories.forEach(cat => {
        if (!solved.includes(cat)) solved.push(cat);
      });
      grid = [];
      renderSolved();
      renderGrid();
      endGame(false);
    }
  }
}

function endGame(won) {
  document.getElementById('controls').style.display = 'none';
  document.getElementById('mistakesRow').style.display = 'none';
  const el = document.getElementById('endState');
  el.style.display = 'block';
  el.innerHTML = `
    <div class="end-msg">
      <p style="color: ${won ? 'var(--gold)' : 'var(--cat-purple)'}">
        ${won ? '✨ All Connections Found ✨' : '⚔️ The Prophecy Remains Unfulfilled ⚔️'}
      </p>
    </div>
  `;
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ═══════════════════════════════════════════════
//  COUNTDOWN
// ═══════════════════════════════════════════════
function startCountdown() {
  updateCountdown();
  setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const diff = tomorrow - now;

  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

  document.getElementById('timer').textContent = `${h}:${m}:${s}`;

  // Auto-refresh at midnight
  if (diff <= 1000) {
    setTimeout(() => location.reload(), 1200);
  }
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    const left = Math.random() * 100;
    const dur = Math.random() * 10 + 8;
    const delay = Math.random() * 12;
    const dx = (Math.random() - 0.5) * 80;
    const hue = Math.random() > 0.5 ? '50,90%,70%' : '280,50%,65%';
    Object.assign(p.style, {
      width: size + 'px',
      height: size + 'px',
      left: left + '%',
      bottom: '-8px',
      background: `radial-gradient(circle, hsla(${hue},0.9), hsla(${hue},0.1))`,
      animationDuration: dur + 's',
      animationDelay: delay + 's',
      '--dx': dx + 'px',
      filter: 'blur(0.4px)',
    });
    container.appendChild(p);
  }
}

// ═══════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════
spawnParticles();
init();
</script>
</body>
</html>
